appId: com.morrow.browser
productName: Morrow Browser
copyright: Copyright © 2025 bseester

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - package.json

win:
  target: nsis
  icon: resources/icons/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - universal
  icon: resources/icons/icon-mac.png
  category: public.app-category.productivity
  # Dev modla aynı davranış — hardenedRuntime kapalı
  # hardenedRuntime açık olunca macOS ek network kısıtlamaları uyguluyor
  # bu da Google'ın embedded webview tespitini tetikliyor
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: true

dmg:
  artifactName: ${productName}-${version}.${ext}

linux:
  target:
    - AppImage
  icon: resources/icons/icon.png
  category: Network

# Publish configuration for auto-updates
publish:
  provider: github
  owner: bseester
  repo: morrow-browser

protocols:
  - name: Morrow Browser URL
    schemes:
      - http
      - https
